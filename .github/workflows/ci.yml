name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  runtime:
    name: Runtime tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runtime
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: runtime/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
